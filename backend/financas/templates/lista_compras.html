{% extends "index.html" %}

{% block content %}
  <h1>Compras: </h1>

  <ul>
    {% for compra in transacoes_compras %}
      <li>
        <a href="{% url 'editar_compra' compra_id=compra.id %}">R$ {{ compra.valor }} - {{ compra.data }}</a>
      </li>
    {% endfor %}
  </ul>

  <a href="{% url 'nova_compra' %}">Adicionar nova Compra</a>
{% endblock content %}
