{% extends "index.html" %}

{% block content %}
  <h1>Recebimentos</h1>

  <ul>
    {% for recebimento in transacoes_recebimentos %}
      <li>
        <a href="{% url 'editar_recebimento' recebimento_id=recebimento.id %}">R$ {{ recebimento.valor }} - {{ recebimento.data }}</a>
      </li>
    {% endfor %}
  </ul>

<a href="{% url 'novo_recebimento' %}">Adicionar novo Recebimento</a>
{% endblock content %}
